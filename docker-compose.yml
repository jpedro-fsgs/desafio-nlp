services:
  backend:
    image: jpedrofsgs/aneel-rag-backend:latest
    container_name: aneel-rag-backend
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    image: jpedrofsgs/aneel-rag-frontend:latest
    container_name: aneel-rag-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    env_file:
      - .env
